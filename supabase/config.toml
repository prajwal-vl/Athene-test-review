# ============================================================
# Supabase local development config for Athene.
# Docs: https://supabase.com/docs/guides/local-development/cli/config
#
# `project_id` is a local-only identifier used by `supabase start`
# to namespace Docker containers. It is NOT the remote project ref
# (that lives in .supabase/project-ref after `supabase link`).
# ============================================================

project_id = "athene-app"

# ------------------------------------------------------------
# API — PostgREST
# ------------------------------------------------------------
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ------------------------------------------------------------
# Database — Postgres 15 with pgvector + pgcrypto for Athene
# ------------------------------------------------------------
[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# Seed data applied after `supabase db reset`. Create supabase/seed.sql
# if you want fixture orgs/members for local dev.
[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# ------------------------------------------------------------
# Realtime
# ------------------------------------------------------------
[realtime]
enabled = true

# ------------------------------------------------------------
# Studio (local dashboard at http://localhost:54323)
# ------------------------------------------------------------
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# ------------------------------------------------------------
# Inbucket — captures outbound email locally
# ------------------------------------------------------------
[inbucket]
enabled = true
port = 54324

# ------------------------------------------------------------
# Storage
# ------------------------------------------------------------
[storage]
enabled = true
file_size_limit = "50MiB"

# ------------------------------------------------------------
# Auth — we use Clerk in production, but keep GoTrue running
# locally so Supabase SDK calls that touch auth don't explode.
# JWT is validated via Clerk JWKS in the real app.
# ------------------------------------------------------------
[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ------------------------------------------------------------
# Edge Functions (not used yet — all agent logic lives in Next.js)
# ------------------------------------------------------------
[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# ------------------------------------------------------------
# Analytics
# ------------------------------------------------------------
[analytics]
enabled = false
